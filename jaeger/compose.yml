services:
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    hostname: jaeger.localhost
    restart: unless-stopped
    ports:
      # - "16686:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-24317}:4317" # otlp grpc
      - "${JAEGER_OTLP_HTTP_PORT:-24318}:4318" # otlp http
      - "8889:8889" # SpanMetrics (Prometheus が SPM 用メトリクスを scrape)
    environment:
      - LOG_LEVEL=debug
      # SPM 用: Prometheus の URL（同一ネットワークのサービス名で指定）
      - PROMETHEUS_ENDPOINT=${PROMETHEUS_ENDPOINT:-http://prometheus:9090}
    volumes:
      - ./docker/resources/config.yaml:/jaeger/config.yaml:ro
      - ./docker/resources/config-ui.json:/jaeger/config-ui.json:ro
    command: ["--config", "/jaeger/config.yaml"]
    networks:
      - docker_compose_samples
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`jaeger.localhost`)"
      - "traefik.http.routers.jaeger.entrypoints=web"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

networks:
  docker_compose_samples:
    external: true
